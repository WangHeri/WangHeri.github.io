<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>绝味鸭脖产品溯源查询</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: "Microsoft YaHei", Arial, sans-serif;
            background-color: #fff8e1;
            color: #333;
            padding: 20px;
            line-height: 1.6;
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
            background-color: white;
            border-radius: 10px;
            padding: 25px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        
        .header {
            text-align: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 3px solid #ffd54f;
        }
        
        h1 {
            color: #333;
            font-size: 28px;
            margin-bottom: 10px;
        }
        
        .subtitle {
            color: #666;
            font-size: 16px;
            margin-bottom: 20px;
        }
        
        .steps {
            display: flex;
            justify-content: space-around;
            flex-wrap: wrap;
            margin: 25px 0;
            background-color: #fffbf0;
            padding: 15px;
            border-radius: 8px;
        }
        
        .step {
            text-align: center;
            width: 120px;
            margin: 10px;
        }
        
        .step-number {
            display: inline-block;
            width: 30px;
            height: 30px;
            background-color: #ffc107;
            color: white;
            border-radius: 50%;
            line-height: 30px;
            font-weight: bold;
            margin-bottom: 8px;
        }
        
        .step-text {
            font-size: 14px;
            color: #666;
        }
        
        .product-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 12px;
            margin-top: 20px;
        }
        
        .product-item {
            background-color: #fffbf0;
            border-radius: 8px;
            padding: 15px 12px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        /* 不同类别的边框颜色 */
        .product-item.signature {
            border: 2px solid #ffd54f; /* 招牌系列 - 黄色 */
        }
        
        .product-item.black-duck {
            border: 2px solid #424242; /* 黑鸭系列 - 深灰色 */
        }
        
        .product-item.five-spice {
            border: 2px solid #795548; /* 五香系列 - 棕色 */
        }
        
        .product-item.other {
            border: 2px solid #78909c; /* 其他 - 蓝灰色 */
        }
        
        .product-item:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 10px rgba(0, 0, 0, 0.1);
        }
        
        .product-item.signature:hover {
            background-color: #fff3e0;
        }
        
        .product-item.black-duck:hover {
            background-color: #f5f5f5;
        }
        
        .product-item.five-spice:hover {
            background-color: #efebe9;
        }
        
        .product-item.other:hover {
            background-color: #eceff1;
        }
        
        .product-name {
            font-weight: bold;
            color: #333;
            font-size: 15px;
            margin-bottom: 5px;
        }
        
        .product-note {
            font-size: 12px;
            color: #ff9800;
        }
        
        .category {
            font-weight: bold;
            font-size: 20px;
            margin: 25px 0 15px 0;
            padding: 8px 15px;
            border-radius: 6px;
            display: inline-block;
        }
        
        .category.signature {
            background-color: #fff3e0;
            color: #ff8f00;
        }
        
        .category.black-duck {
            background-color: #f5f5f5;
            color: #424242;
        }
        
        .category.five-spice {
            background-color: #efebe9;
            color: #6d4c41;
        }
        
        .category.other {
            background-color: #eceff1;
            color: #546e7a;
        }
        
        .footer {
            text-align: center;
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #eee;
            color: #999;
            font-size: 13px;
        }
        
        .brand {
            font-weight: bold;
            font-size: 20px;
            color: #333;
            margin: 10px 0;
        }
        
        @media (max-width: 600px) {
            .product-list {
                grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>产品溯源 安全放心</h1>
            <div class="subtitle">扫码查生产日期、配料信息和相关报告</div>
        </div>
        
        <!-- 分类标题和产品列表将通过JavaScript动态生成 -->
        <div id="categories-container"></div>
        
        <div class="footer">
            <div class="brand">绝味鸭脖</div>
            <p>每个产品对应独立的溯源信息</p>
            <p>© 2026 绝味鸭脖版权所有</p>
        </div>
    </div>
    
    <script>
        // 产品数据 - 请将下面的链接替换为您提取的实际链接
        const products = [
            { name: "招牌鸭脖", url: "https://zs.yishutec.com/01/552957150027" },
            { name: "招牌鸭掌", url: "https://zs.yishutec.com/01/5529571502X020" },
            { name: "招牌鸭锁骨", url: "https://zs.yishutec.com/01/552957150012" },
            { name: "招牌鸭肠", url: "https://zs.yishutec.com/01/5529571502X017" },
            { name: "招牌腐竹", url: "https://zs.yishutec.com/01/552957150038" },
            { name: "招牌鸡翅尖", url: "https://zs.yishutec.com/01/5529571502X018" },
            { name: "招牌鸭心", url: "https://zs.yishutec.com/01/552957150010" },
            { name: "招牌鸭舌", url: "https://zs.yishutec.com/01/552957150017" },
            { name: "招牌鸭食管", url: "https://zs.yishutec.com/01/552957150022" },
            { name: "招牌虾球", url: "https://zs.yishutec.com/01/552957150029" },
            { name: "招牌鱼豆腐", url: "https://zs.yishutec.com/01/552957150019" },
            { name: "酸辣竹笋", url: "https://zs.yishutec.com/01/06954167210960" },
            { name: "招牌海带结", url: "https://zs.yishutec.com/01/552957150037" },
            { name: "招牌鸭肫", url: "https://zs.yishutec.com/01/06954167210687" },
            { name: "招牌毛豆", url: "https://zs.yishutec.com/01/5529571502X019" }, 
            { name: "黑鸭鸭脖", url: "https://zs.yishutec.com/01/552957150068" },
            { name: "黑鸭鸭掌", url: "https://zs.yishutec.com/01/06954167210717" },
            { name: "黑鸭鸭锁骨", url: "https://zs.yishutec.com/01/552957150065" },
            { name: "黑鸭鸭头", url: "https://zs.yishutec.com/01/552957150061" },
            { name: "黑鸭鸭翅中", url: "https://zs.yishutec.com/01/5529571502X021" },
            { name: "黑鸭豆干", url: "https://zs.yishutec.com/01/552957150071" },
            { name: "五香鸭脖", url: "https://zs.yishutec.com/01/552957150050" },
            { name: "五香鸭舌", url: "https://zs.yishutec.com/01/552957150047" },
            { name: "五香鸭掌", url: "https://zs.yishutec.com/01/5529571502X020" },
            { name: "五香鸭锁骨", url: "https://zs.yishutec.com/01/552957150049" },
            { name: "酸辣藕片", url: "https://zs.yishutec.com/01/552957150055" },
            { name: "虎皮凤爪", url: "https://zs.yishutec.com/01/56654607X0005" }
        ];

        // 根据产品名称自动分类
        const categorizedProducts = {
            "招牌系列": [],
            "黑鸭系列": [],
            "五香系列": [],
            "其他": []
        };

        // 分类函数
        function categorizeProduct(product) {
            const name = product.name;
            
            if (name.includes("招牌")) {
                return "招牌系列";
            } else if (name.includes("黑鸭")) {
                return "黑鸭系列";
            } else if (name.includes("五香")) {
                return "五香系列";
            } else {
                return "其他";
            }
        }

        // 对产品进行分类
        products.forEach(product => {
            const category = categorizeProduct(product);
            // 为产品添加类别属性
            product.category = category;
            categorizedProducts[category].push(product);
        });

        // 类别显示顺序
        const categoryOrder = ["招牌系列", "黑鸭系列", "五香系列", "其他"];
        
        // 类别样式映射
        const categoryClassMap = {
            "招牌系列": "signature",
            "黑鸭系列": "black-duck",
            "五香系列": "five-spice",
            "其他": "other"
        };
        
        const categoriesContainer = document.getElementById('categories-container');
        
        // 生成产品列表
        categoryOrder.forEach(categoryName => {
            const productsInCategory = categorizedProducts[categoryName];
            
            if (productsInCategory.length === 0) return;
            
            const categoryClass = categoryClassMap[categoryName];
            
            // 创建类别标题
            const categoryTitle = document.createElement('div');
            categoryTitle.className = `category ${categoryClass}`;
            categoryTitle.textContent = categoryName;
            categoriesContainer.appendChild(categoryTitle);
            
            // 创建这个类别的产品列表容器
            const productList = document.createElement('div');
            productList.className = 'product-list';
            
            // 添加这个类别的所有产品
            productsInCategory.forEach(product => {
                const productItem = document.createElement('div');
                productItem.className = `product-item ${categoryClass}`;
                productItem.innerHTML = `
                    <div class="product-name">${product.name}</div>
                    <div class="product-note">点击查看溯源信息</div>
                `;
                
                productItem.addEventListener('click', function() {
                    window.location.href = product.url;
                });
                
                productList.appendChild(productItem);
            });
            
            categoriesContainer.appendChild(productList);
        });

        // 控制台输出分类结果，方便调试
        console.log("产品分类结果：", categorizedProducts);
        console.log("产品总数：", products.length);
    </script>
</body>
</html>
